name: Build & Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          BASE=$(tr -d '[:space:]' < VERSION)
          VER="${BASE}.${{ github.run_number }}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "Versión calculada: $VER"

  # ----------------------------------------------------------------------
  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Instalar componentes del SDK
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decodificar keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Pruebas unitarias + APK release firmado
        working-directory: android-app
        env:
          VERSION_NAME: ${{ needs.version.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle testDebugUnitTest assembleRelease --no-daemon --stacktrace

      - name: Renombrar APK
        run: cp android-app/app/build/outputs/apk/release/app-release.apk encuestas-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: encuestas-android.apk
          if-no-files-found: error

  # ----------------------------------------------------------------------
  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Instalar WiX + extensión firewall
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.Firewall.wixext/5.0.2

      - name: Pruebas unitarias (.NET)
        run: dotnet test windows-app/tests/Encuestas.Tests/Encuestas.Tests.csproj -c Release --nologo

      - name: Publicar (self-contained, single file)
        run: >
          dotnet publish windows-app/src/EncuestasCentral/EncuestasCentral.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none
          -o publish

      - name: Construir MSI
        shell: pwsh
        run: |
          $pub = (Resolve-Path publish).Path
          $icon = (Resolve-Path windows-app/src/EncuestasCentral/Assets/app.ico).Path
          wix build windows-app/installer/Package.wxs `
            -ext WixToolset.Firewall.wixext `
            -d "Version=${{ needs.version.outputs.version }}" `
            -d "PublishDir=$pub" `
            -d "IconFile=$icon" `
            -o EncuestasCentral.msi

      - uses: actions/upload-artifact@v4
        with:
          name: msi
          path: EncuestasCentral.msi
          if-no-files-found: error

  # ----------------------------------------------------------------------
  release:
    needs: [ version, android, windows ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: msi
          path: dist

      - name: Borrar releases anteriores (mantener solo la última)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for tag in $(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName'); do
            echo "Borrando release y tag anterior: $tag"
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          done

      - name: Publicar nueva release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          # Renombrar los binarios incluyendo el tag de la versión.
          APK="encuestas-android-$TAG.apk"
          MSI="EncuestasCentral-$TAG.msi"
          mv dist/encuestas-android.apk "dist/$APK"
          mv dist/EncuestasCentral.msi "dist/$MSI"
          {
            echo "### 📦 Sistema de Encuestas Offline — $TAG"
            echo ""
            echo "Binarios listos para instalar (compilados automáticamente en CI):"
            echo ""
            echo "- 📱 **Android**: \`$APK\` → permitir orígenes desconocidos e instalar (APK release firmado)."
            echo "- 🖥️ **Windows**: \`$MSI\` → doble clic e instalar (self-contained, no requiere .NET)."
            echo ""
            echo "> Solo se conserva la última release; las anteriores se eliminan automáticamente en cada nuevo build."
          } > notes.md
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Encuestas Offline $TAG" \
            --notes-file notes.md \
            "dist/$APK" \
            "dist/$MSI"
